name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.3"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            [[ ! $VERSION =~ ^v ]] && VERSION="v$VERSION"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=swift-member-lineup-$VERSION-macos.tar.gz" >> $GITHUB_OUTPUT

      - name: Inject version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          sed -i '' "s/0.0.0-dev/$VERSION/" Sources/SwiftMemberLineUp/Version.swift

      - name: Build
        run: swift build -c release

      - name: Package
        run: |
          mkdir -p release
          cp .build/release/swift-member-lineup release/
          cd release && tar -czf "${{ steps.version.outputs.artifact_name }}" swift-member-lineup

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: release/${{ steps.version.outputs.artifact_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
